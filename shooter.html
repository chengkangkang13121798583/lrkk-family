<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔫 射击生存 · LRKK</title>
    <link rel="stylesheet" href="shooter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="gameWrapper">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">生命</span>
                <span class="hud-value" id="healthDisplay">❤️❤️❤️❤️❤️</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">武器</span>
                <span class="hud-value" id="weaponDisplay">⚡ 步枪</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">弹药</span>
                <span class="hud-value" id="ammoDisplay">30/30</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">击杀</span>
                <span class="hud-value" id="killDisplay">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">关卡</span>
                <span class="hud-value" id="levelDisplay">第1关</span>
            </div>
        </div>

        <!-- 开镜遮罩 -->
        <div id="scopeOverlay"></div>

        <!-- Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- 覆盖层 -->
        <div id="overlay">
            <div id="overlayContent">
                <h1 id="overlayTitle">🔫 射击生存</h1>
                <p id="overlaySubtitle">消灭所有敌人，活到最后！</p>
                <div id="overlayControls">
                    <p>🖱️ WASD 移动 · 鼠标左键射击</p>
                    <p>⌨️ 1=步枪 · 2=狙击 · 3=加特林 · 4=火箭弹</p>
                    <p>🔄 滚轮切枪 · R/空格换弹 · 右键开镜(狙击)</p>
                    <p>🎯 共5关 · 击杀达标出Boss · 击败Boss通关</p>
                    <p>❤️ 击杀敌人30%概率掉落血包</p>
                </div>
                <button id="startBtn">开始游戏</button>
            </div>
        </div>

        <a href="index.html" id="backBtn" title="返回主页">← 返回</a>
    </div>

    <script src="shooter.js"></script>
</body>
</html>
