<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值观库 · LRKK</title>
    <meta name="description" content="LRKK 价值观库 — 健身 · 读书 · 投资 · 陪家人 · 帮朋友">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* 覆盖 body 背景为深色，3D 场景更突出 */
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 顶部导航 */
        .values-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .values-nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .values-nav-logo {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .values-nav-back {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .values-nav-back:hover {
            color: rgba(255,255,255,0.9);
        }

        .values-nav-title {
            font-family: Georgia, 'Noto Serif SC', serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
        }

        .values-nav-add {
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            background: rgba(255,255,255,0.08);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }

        .values-nav-add:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            color: #fff;
        }

        /* 搜索框 */
        .values-search {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 400px;
        }

        .values-search-input {
            width: 100%;
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 100px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .values-search-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .values-search-input:focus {
            border-color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.7);
        }

        /* 搜索提示 */
        .values-search-hint {
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
            text-align: center;
        }

        /* 底部操作提示 */
        .values-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .values-hint span {
            display: inline-block;
            margin: 0 12px;
        }

        /* 节点标签（CSS2D 替代方案） */
        .node-label {
            position: absolute;
            color: rgba(255,255,255,0.8);
            font-size: 0.75rem;
            font-family: Georgia, 'Noto Serif SC', serif;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .node-label.highlighted {
            color: #fff;
            font-size: 0.9rem;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* ===== 卡片弹窗 - 简洁毛玻璃风格 ===== */
        .value-card-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .value-card-overlay.active {
            display: flex;
        }

        .value-card {
            background: rgba(20,20,24,0.92);
            border-radius: 20px;
            max-width: 380px;
            width: 100%;
            padding: 36px 32px 28px;
            position: relative;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            animation: card-enter 0.25s ease-out;
        }

        @keyframes card-enter {
            from { opacity: 0; transform: scale(0.92) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .value-card-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.25);
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            font-family: sans-serif;
            line-height: 1;
        }

        .value-card-close:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
        }

        .value-card-emoji {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 4px;
        }

        .value-card-title {
            font-family: Georgia, 'Noto Serif SC', serif;
            font-size: 1.15rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .value-card-desc {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.7;
            margin-bottom: 14px;
            font-weight: 300;
        }

        .value-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 18px;
        }

        .value-card-tag {
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.65rem;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.3px;
        }

        .value-card-meta {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.2);
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .value-card-actions {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .value-card-btn {
            padding: 7px 18px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.3px;
        }

        .value-card-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .value-card-btn.primary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .value-card-btn.primary:hover {
            background: rgba(255,255,255,0.16);
        }

        .value-card-btn.danger {
            color: rgba(255,100,100,0.6);
        }

        .value-card-btn.danger:hover {
            background: rgba(255,80,80,0.12);
            color: #ff6b6b;
        }

        /* ===== 编辑/新增表单 ===== */
        .value-form-group {
            margin-bottom: 12px;
        }

        .value-form-label {
            display: block;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .value-form-input,
        .value-form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            font-size: 0.82rem;
            color: rgba(255,255,255,0.85);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .value-form-input:focus,
        .value-form-textarea:focus {
            border-color: rgba(255,255,255,0.2);
        }

        .value-form-textarea {
            min-height: 56px;
            resize: vertical;
        }

        /* 节点数量统计 */
        .values-count {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .values-nav {
                padding: 12px 16px;
            }
            .values-nav-title {
                display: none;
            }
            .values-search {
                top: 65px;
            }
            .value-card {
                padding: 24px 20px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="values-nav">
        <div class="values-nav-left">
            <a href="index.html" class="values-nav-back">← 返回</a>
            <span class="values-nav-logo">LRKK</span>
        </div>
        <span class="values-nav-title">💎 价值观库</span>
        <button class="values-nav-add" id="valueAddBtn" onclick="openAddValueCard()">+ 新增</button>
    </nav>

    <!-- 搜索框 -->
    <div class="values-search">
        <input type="text" class="values-search-input" id="valueSearchInput" placeholder="搜索价值观..." autocomplete="off">
    </div>
    <div class="values-search-hint">拖拽旋转 · 滚轮缩放 · 点击节点查看详情</div>

    <!-- 3D 容器 -->
    <div id="threeContainer" style="width:100vw;height:100vh;"></div>

    <!-- 底部提示 -->
    <div class="values-hint">
        <span>🖱 拖拽旋转</span>
        <span>🔍 滚轮缩放</span>
        <span>👆 点击节点</span>
    </div>
    <div class="values-count" id="valuesCount">0 个价值观</div>

    <!-- 卡片弹窗 -->
    <div class="value-card-overlay" id="valueCardOverlay">
        <div class="value-card">
            <button class="value-card-close" id="valueCardClose">&times;</button>
            <div id="valueCardBody">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </div>

    <script src="values-data.js"></script>
    <script src="values.js"></script>
</body>
</html>
